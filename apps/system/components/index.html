<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Condo Floor Plan Preview</title>

    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        background-color: #f9fafb;
        margin: 0;
        padding: 40px 20px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      function CondoFloorPlan() {
        const [selectedRoom, setSelectedRoom] = useState(null);

        const rooms = [
          {
            id: "101",
            name: "Unit 101",
            status: "available",
            style: { gridArea: "1 / 1 / 2 / 2" },
          },
          {
            id: "102",
            name: "Unit 102",
            status: "occupied",
            style: { gridArea: "1 / 2 / 2 / 3" },
          },
          {
            id: "103",
            name: "Unit 103",
            status: "available",
            style: { gridArea: "1 / 3 / 2 / 4" },
          },
          {
            id: "104",
            name: "Unit 104",
            status: "maintenance",
            style: { gridArea: "1 / 4 / 2 / 5" },
          },
          {
            id: "105",
            name: "Unit 105",
            status: "occupied",
            style: { gridArea: "1 / 5 / 2 / 6" },
          },
          {
            id: "106",
            name: "Unit 106",
            status: "available",
            style: { gridArea: "3 / 1 / 4 / 2" },
          },
          {
            id: "107",
            name: "Unit 107",
            status: "available",
            style: { gridArea: "3 / 2 / 4 / 3" },
          },
          {
            id: "108",
            name: "Unit 108",
            status: "occupied",
            style: { gridArea: "3 / 3 / 4 / 4" },
          },
          {
            id: "109",
            name: "Unit 109",
            status: "available",
            style: { gridArea: "3 / 4 / 4 / 5" },
          },
          {
            id: "110",
            name: "Unit 110",
            status: "occupied",
            style: { gridArea: "3 / 5 / 4 / 6" },
          },
        ];

        const handleRoomClick = (room) => {
          setSelectedRoom(room);
        };

        const getRoomColor = (status, isSelected) => {
          if (isSelected) return "#3b82f6"; // Blue
          switch (status) {
            case "occupied":
              return "#ef4444"; // Red
            case "available":
              return "#22c55e"; // Green
            case "maintenance":
              return "#eab308"; // Yellow
            default:
              return "#d1d5db"; // Gray
          }
        };

        return (
          <div
            style={{
              fontFamily: "system-ui, sans-serif",
              maxWidth: "800px",
              margin: "0 auto",
            }}
          >
            <h2 style={{ color: "#111827" }}>Floor 1 Overview</h2>

            {/* Information Panel */}
            <div
              style={{
                marginBottom: "20px",
                padding: "15px",
                backgroundColor: "#ffffff",
                border: "1px solid #e5e7eb",
                borderRadius: "8px",
                minHeight: "60px",
                boxShadow: "0 1px 2px rgba(0,0,0,0.05)",
              }}
            >
              {selectedRoom ? (
                <p style={{ margin: 0, fontSize: "1.1rem" }}>
                  <strong>Selected:</strong> {selectedRoom.name} &nbsp;|&nbsp;{" "}
                  <strong>Status:</strong>{" "}
                  <span
                    style={{
                      color: getRoomColor(selectedRoom.status, false),
                      fontWeight: "bold",
                    }}
                  >
                    {selectedRoom.status.toUpperCase()}
                  </span>
                </p>
              ) : (
                <p style={{ margin: 0, color: "#6b7280", fontSize: "1.1rem" }}>
                  Click on a room to view details.
                </p>
              )}
            </div>

            {/* Floor Plan Grid */}
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(5, 1fr)",
                gridTemplateRows: "120px 80px 120px",
                gap: "8px",
                backgroundColor: "#1f2937",
                padding: "12px",
                borderRadius: "8px",
                boxShadow: "0 4px 6px rgba(0,0,0,0.1)",
              }}
            >
              {/* Render Rooms */}
              {rooms.map((room) => {
                const isSelected = selectedRoom?.id === room.id;
                return (
                  <button
                    key={room.id}
                    onClick={() => handleRoomClick(room)}
                    style={{
                      ...room.style,
                      backgroundColor: getRoomColor(room.status, isSelected),
                      border: isSelected
                        ? "4px solid #1e3a8a"
                        : "2px solid rgba(0,0,0,0.1)",
                      borderRadius: "6px",
                      color: "white",
                      fontSize: "1rem",
                      fontWeight: "bold",
                      cursor: "pointer",
                      transition: "all 0.2s ease",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      boxShadow: "inset 0 2px 4px rgba(255,255,255,0.2)",
                    }}
                  >
                    {room.name}
                  </button>
                );
              })}

              {/* Render Hallway */}
              <div
                style={{
                  gridArea: "2 / 1 / 3 / 6",
                  backgroundColor: "#e5e7eb",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  color: "#4b5563",
                  letterSpacing: "6px",
                  fontWeight: "bold",
                  fontSize: "1.2rem",
                  borderRadius: "4px",
                }}
              >
                MAIN CORRIDOR
              </div>
            </div>
          </div>
        );
      }

      // Render the component to the DOM
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<CondoFloorPlan />);
    </script>
  </body>
</html>
